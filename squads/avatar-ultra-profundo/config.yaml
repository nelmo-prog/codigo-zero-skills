pack:
  name: avatar-ultra-profundo
  version: 1.0.0
  short-title: Avatar Ultra Profundo Squad
  description: >-
    Squad de elite para construção de dossiês psicológicos ultra profundos de avatares.
    Metodologia de 14 blocos, 50 camadas e 10 subcamadas de autossabotagem. 8 agentes
    clonados de mentes reais (Cialdini, Kahneman, Brené Brown, Schwartz, Christensen,
    Abraham, Hormozi, mais orquestrador). Output alimenta diretamente S.C.A.L.E., copy
    e ads. Pensado para a imersão Código ZERO.
  author: Nelmo, A Nova Inteligência
  icon: "🧠"
  slashPrefix: avatar-ultra-profundo

# Pattern Library
pattern_library:
  prefix: AV
  naming_convention:
    format: "{PREFIX}-{CATEGORY}-{NUMBER}"
    example: "AV-TP-001"
  categories:
    - id: TP
      name: "Task Patterns"
      description: "Padrões de estrutura e execução de tasks do squad"
    - id: EP
      name: "Executor Patterns"
      description: "Padrões de seleção de executores"
    - id: PP
      name: "Process Patterns"
      description: "Padrões de processo e workflow"
    - id: IP
      name: "Integration Patterns"
      description: "Integrações com S.C.A.L.E., copy, ads"
    - id: DP
      name: "Dossie Patterns"
      description: "Padrões de dossiê reutilizáveis"
    - id: LP
      name: "Language Patterns"
      description: "Padrões de linguagem crua do avatar"
  patterns: []

# Task Standards
task_standards:
  enforce_anatomy: true
  validator: "AV-TP-001"
  required_fields:
    - task_name
    - status
    - responsible_executor
    - execution_type
    - input
    - output
    - action_items
    - acceptance_criteria
  optional_fields:
    - estimated_time
    - dependencies
    - templates
    - quality_gate
    - handoff

# Executor Types
executor_types:
  human:
    id: "AV-EP-001"
    name: "Human Executor"
    use_for:
      - "Validação final do dossiê"
      - "Aprovação antes de levar pra S.C.A.L.E."
      - "Overrides de autoauditoria"
  agent:
    id: "AV-EP-002"
    name: "Agent Executor (AI)"
    use_for:
      - "Rodar os 14 blocos"
      - "Extrair linguagem crua"
      - "Compilar dossiê final"
      - "Autoauditoria"
  hybrid:
    id: "AV-EP-003"
    name: "Hybrid Executor"
    use_for:
      - "Revisão humanidade (LLM propõe, humano confirma)"
      - "Validação do motivo real de compra"

executor_selection:
  requires_depth: [agent, human]
  requires_creativity: [agent, hybrid]
  requires_speed: agent
  requires_validation: hybrid

# Workflow Configuration
workflow_config:
  checkpoint_policy: always_active
  checkpoint_modes:
    always_active: "Todo checkpoint DEVE passar"
    skip_on_override: "Pode pular com aprovação manual"
    advisory: "Só alerta, não bloqueia"
  fail_fast: true
  allow_manual_override: false

# Agent Tiers
tier_system:
  tier_0:
    name: "Orquestração e Diagnóstico"
    agents:
      - avatar-chief
      - robert-cialdini
      - daniel-kahneman
  tier_1:
    name: "Masters de Domínio"
    agents:
      - brene-brown
      - jay-abraham
      - clayton-christensen
      - eugene-schwartz
  tier_2:
    name: "Sistematizadores Comerciais"
    agents:
      - alex-hormozi-avatar

# Regras de Escrita (override global)
writing_rules:
  language: pt-BR
  orthography: obrigatoria
  forbidden_chars: ["—"]
  forbidden_patterns:
    - "resultados consistentes"
    - "transformação real"
    - "mais produtividade"
    - "melhores resultados"
    - "tomar controle"
  required_patterns:
    - "autossabotagem marcada como força central"
    - "linguagem crua (25+ frases humanas)"
    - "marcação FATO / INFERÊNCIA / HIPÓTESE"

settings:
  greeting: named
  language: pt-BR
  max_context_files: 5
